<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Pre-launch premium landing page for Chabbra's Heaven Heights at Saheb Nagar, Vanasthalipuram."
    />
    <title>Chabbra's Heaven Heights | Pre-Launch</title>
    <link rel="icon" type="image/png" href="./injapur_logo.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Manrope:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <form name="project-enquiry" method="POST" data-netlify="true" netlify netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="project-enquiry" />
      <input type="text" name="bot-field" />
      <input type="text" name="name" />
      <input type="tel" name="phone" />
      <input type="text" name="interest" />
      <input type="text" name="project" />
      <input type="text" name="submittedAt" />
      <button type="submit">Submit</button>
    </form>
    <div id="root"></div>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
